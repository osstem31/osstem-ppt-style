<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT Presentation - 오스템 중국 법인 이커머스 전략</title>
    <style>
        :root {
            --primary-dark: #070324;
            --text-white: #ffffff;
            --text-dark: #333333;
            --accent-red: #e60012;
            --bg-gray: #f5f5f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
        }

        body {
            background-color: #1a1a1a;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #ppt-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 1920px;
            height: 1080px;
            transform-origin: center center;
            transform: translate(-50%, -50%) scale(1);
            background-color: var(--primary-dark);
            overflow: hidden;
        }

        .ppt-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            background-color: var(--primary-dark);
            display: none;
        }

        .ppt-slide.active {
            display: block !important;
        }

        .ppt-slide.contents-slide.active,
        .ppt-slide.ending-slide.active {
            display: flex !important;
        }

        /* --- Slide 1: Cover --- */
        .cover-slide {
            background-color: white;
        }

        .cover-top {
            background-color: var(--primary-dark);
            height: 400px;
            position: relative;
            width: 100%;
        }

        .background-globe {
            position: absolute;
            top: 0;
            right: 0;
            height: 100%;
            object-fit: contain;
        }

        .cover-divider {
            position: absolute;
            top: 400px; /* Exact junction */
            left: 0;
            width: 1920px;
            margin-top: -2px; /* Overlap to hide white line */
            z-index: 5;
        }

        .vision-text {
            position: absolute;
            top: 80px;
            left: 100px;
            color: var(--accent-red);
            font-size: 35px;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .main-title {
            position: absolute;
            top: 150px;
            left: 100px;
            color: var(--text-white);
            font-size: 100px;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1.2;
        }

        .cover-bottom {
            height: 680px;
            background-color: white;
            position: relative;
            padding: 150px 0 0 0;
        }

        .info-list {
            list-style: none;
            margin-left: 300px;
            margin-top: 250px;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            color: #000000;
            font-size: 30px;
        }

        .info-icon {
            width: 32px;
            height: 32px;
            margin-right: 20px;
            stroke: var(--accent-red);
            stroke-width: 1.2;
            fill: none;
        }

        .osstem-logo {
            position: absolute;
            bottom: 60px;
            right: 140px;
            width: 200px;
            height: auto;
        }

        /* --- Slide 2: Contents --- */
        .contents-slide {
            background-color: white;
        }

        .sidebar {
            width: 212px;
            height: 1080px;
            background-color: var(--primary-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .sidebar-title {
            color: var(--text-white);
            font-size: 40px;
            font-weight: 800;
            transform: translateY(-20px);
            letter-spacing: -1px;
        }

        .vertical-divider {
            position: absolute;
            top: 0;
            left: 212px;
            height: 1080px;
            margin-left: -2px; /* Overlap */
            z-index: 5;
        }

        .contents-content {
            flex: 1;
            padding: 120px 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .contents-list {
            list-style: none;
            margin-left: 120px;
        }

        .contents-item {
            margin-bottom: 45px;
            display: flex;
            align-items: baseline;
        }

        .item-number {
            color: var(--accent-red);
            font-size: 40px;
            font-weight: 800;
            margin-right: 30px;
            width: 60px;
        }

        .item-text {
            color: var(--text-dark);
            font-size: 40px;
            font-weight: 600;
        }

        /* --- Slide 3: Content Page --- */
        .content-slide {
            background-color: white;
        }

        .content-header {
            height: 100px;
            background-color: var(--primary-dark);
            padding: 0 100px;
            display: flex;
            align-items: center;
            position: relative;
        }

        .pointy-divider {
            position: absolute;
            top: 100px;
            left: 0;
            width: 1920px;
            margin-top: -2px; /* Overlap */
            z-index: 5;
        }

        .content-title {
            color: var(--text-white);
            font-size: 45px;
            font-weight: 800;
        }

        .body-area {
            height: 980px;
            padding: 160px 100px;
            background-color: white;
        }

        .bullet-item {
            font-size: 45px;
            color: var(--text-dark);
            margin-bottom: 50px;
            display: flex;
            align-items: flex-start;
            font-weight: 600;
            line-height: 1.4;
        }

        .bullet-dot {
            width: 15px;
            height: 15px;
            background-color: var(--accent-red);
            margin-top: 25px;
            margin-right: 30px;
            flex-shrink: 0;
        }

        /* --- Slide 4: Ending --- */
        .ppt-slide.ending-slide.active {
            display: flex !important;
            background-color: white;
        }

        .ending-left {
            flex: 1.2;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            position: relative;
        }

        .thank-you-text {
            font-size: 160px;
            font-weight: 800;
            color: #C1C6C8;
            line-height: 0.9;
            text-align: left;
            transform: translateX(-50px);
        }

        .ending-right {
            flex: 1;
            background-color: var(--primary-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .qna-text {
            color: var(--text-white);
            font-size: 80px;
            font-weight: 800;
        }

        .ending-divider {
            position: absolute;
            top: 0;
            right: 100%;
            height: 100%;
            width: auto;
            margin-right: -3px;
            z-index: 10;
            pointer-events: none;
        }

        /* --- Controls --- */
        .controls {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 100;
        }

        .nav-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 30px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .nav-btn:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: scale(1.1);
        }

        .page-indicator {
            position: absolute;
            bottom: 45px;
            right: 100px;
            color: #aaaaaa;
            font-size: 24px;
            font-weight: 500;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="ppt-wrapper">
        <!-- Slide 1: Cover -->
        <div class="ppt-slide active cover-slide" id="slide-1">
            <div class="cover-top">
                <img src="u5.png" alt="Graphic" class="background-globe">
                <div class="vision-text">VISION 2034</div>
                <h1 class="main-title">제목을 입력하세요</h1>
            </div>
            <img src="divinder.png" alt="Divider" class="cover-divider">
            <div class="cover-bottom">
                <ul class="info-list">
                    <li class="info-item">
                        <svg class="info-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        <span>소속팀 / 작성자</span>
                    </li>
                    <li class="info-item">
                        <svg class="info-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        <span>00매</span>
                    </li>
                    <li class="info-item">
                        <svg class="info-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        <span>2026.00.00</span>
                    </li>
                </ul>
                <img src="Logo.png" alt="OSSTEM Logo" class="osstem-logo">
            </div>
        </div>

        <!-- Slide 2: Contents -->
        <div class="ppt-slide contents-slide" id="slide-2">
            <div class="sidebar">
                <h2 class="sidebar-title">Contents</h2>
            </div>
            <img src="divinder_2.png" alt="Vertical Divider" class="vertical-divider">
            <div class="contents-content">
                <ul class="contents-list">
                    <li class="contents-item">
                        <span class="item-number">1.</span>
                        <span class="item-text">내용을 입력하세요</span>
                    </li>
                    <li class="contents-item">
                        <span class="item-number">2.</span>
                        <span class="item-text">내용을 입력하세요</span>
                    </li>
                    <li class="contents-item">
                        <span class="item-number">3.</span>
                        <span class="item-text">내용을 입력하세요</span>
                    </li>
                    <li class="contents-item">
                        <span class="item-number">4.</span>
                        <span class="item-text">내용을 입력하세요</span>
                    </li>
                    <li class="contents-item">
                        <span class="item-number">5.</span>
                        <span class="item-text">내용을 입력하세요</span>
                    </li>
                </ul>
            </div>
        </div>

        <!-- Slide 3: Content Page -->
        <div class="ppt-slide content-slide" id="slide-3">
            <div class="content-header">
                <h2 class="content-title">I. 제목을 입력하세요</h2>
            </div>
            <img src="divinder_3.png" alt="Divider" class="pointy-divider">
            <div class="body-area">
                <ul class="bullet-list">
                    <li class="bullet-item"><div class="bullet-dot"></div> 상세 내용이 들어갑니다.</li>
                    <li class="bullet-item"><div class="bullet-dot"></div> 주요 지표 및 성과를 기술합니다.</li>
                    <li class="bullet-item"><div class="bullet-dot"></div> 핵심 전략 방향을 제시합니다.</li>
                </ul>
                <div class="page-indicator">3 / 4</div>
            </div>
        </div>

        <!-- Slide 4: Ending -->
        <div class="ppt-slide ending-slide" id="slide-4">
            <div class="ending-left">
                <div class="thank-you-text">Thank<br>you.</div>
            </div>
            <div class="ending-right">
                <img src="divinder_4.png" alt="divider" class="ending-divider">
                <div class="qna-text">Q&A</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="nav-btn" id="prevBtn">←</button>
        <button class="nav-btn" id="nextBtn">→</button>
    </div>

    <script>
        const slides = document.querySelectorAll('.ppt-slide');
        let currentIdx = 0;

        function showSlide(index) {
            slides.forEach((slide, i) => {
                slide.classList.toggle('active', i === index);
                
                const indicator = slide.querySelector('.page-indicator');
                if (indicator) {
                    indicator.textContent = `${i + 1} / ${slides.length}`;
                }
            });
        }

        document.getElementById('nextBtn').addEventListener('click', () => {
            if (currentIdx < slides.length - 1) {
                currentIdx++;
                showSlide(currentIdx);
            }
        });

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentIdx > 0) {
                currentIdx--;
                showSlide(currentIdx);
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                if (currentIdx < slides.length - 1) { currentIdx++; showSlide(currentIdx); }
            } else if (e.key === 'ArrowLeft') {
                if (currentIdx > 0) { currentIdx--; showSlide(currentIdx); }
            }
        });

        function adjustScale() {
            const wrapper = document.getElementById('ppt-wrapper');
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080) * 0.95;
            wrapper.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }

        window.addEventListener('resize', adjustScale);
        adjustScale();
        showSlide(currentIdx);
    </script>
</body>
</html>
