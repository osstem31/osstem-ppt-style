<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT Presentation - VISION 2034</title>
    <style>
        :root {
            --primary-dark: #070324;
            --text-white: #ffffff;
            --text-dark: #333333;
            --accent-red: #e60012;
            --bg-gray: #f5f5f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
        }

        body {
            background-color: #1a1a1a;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #ppt-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 1920px;
            height: 1080px;
            transform-origin: center center;
            transform: translate(-50%, -50%) scale(1);
            background-color: #000; /* Dark background to prevent white lines */
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            overflow: hidden;
        }

        .ppt-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            background-color: var(--primary-dark); /* Base is now dark to hide gaps */
            display: none; /* Hide by default */
            overflow: hidden;
            z-index: 1;
            border: none !important;
            outline: none !important;
        }
        
        .ppt-slide.active {
            display: block !important;
            z-index: 10;
        }

        /* Specific slide background overrides */
        .ppt-slide.ending-slide {
            background-color: white; /* Match the new 2-split design base */
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* --- Shared Components --- */
        .fade-in {
            /* Animation removed as per request */
            opacity: 1 !important;
            transform: none !important;
        }

        /* --- Slide 1: Cover --- */
        .cover-slide {
            /* Background is now inherited from .ppt-slide (dark) to prevent edge lines */
        }

        .cover-top {
            width: 100%;
            left: 0;
            height: 400px;
            background-color: var(--primary-dark);
            position: relative;
            padding: 120px 200px;
            z-index: 10;
            border: none !important;
            box-shadow: none !important;
        }

        .cover-divider {
            position: absolute;
            top: 100%;
            left: 0;
            width: 1920px;
            height: auto;
            margin-top: -3px; /* Overlap further into navy to hide white line */
            z-index: 10;
            pointer-events: none;
        }

        .background-globe {
            position: absolute;
            top: 0;
            right: 0;
            width: 581px;
            height: 444px;
            object-fit: cover;
            opacity: 0.8;
        }

        .vision-text {
            color: var(--accent-red);
            font-size: 35px;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .main-title {
            color: var(--text-white);
            font-size: 100px;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1.2;
        }

        .cover-bottom {
            height: 680px; /* Fill the rest of the 1080px */
            padding: 150px 0 0 0;
            position: relative;
            background-color: white;
        }

        .info-list {
            list-style: none;
            margin-left: 300px;
            margin-top: 250px; /* Reduced from 400px to prevent cutting off */
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            color: #000000;
            font-size: 30px;
        }

        .info-icon {
            width: 32px;
            height: 32px;
            margin-right: 20px;
            stroke: var(--accent-red);
            stroke-width: 1.2;
            fill: none;
        }

        .osstem-logo {
            position: absolute;
            bottom: 60px; /* Moved down by 40px from 100px */
            right: 140px;
            width: 200px !important;
            height: 117px !important;
            object-fit: contain;
            z-index: 5;
        }

        /* --- Slide 2: Contents --- */
        .ppt-slide.contents-slide.active {
            display: flex !important;
        }

        .sidebar {
            width: 212px;
            height: 100%;
            background-color: var(--primary-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .sidebar-title {
            color: var(--text-white);
            font-size: 40px; /* Reduced as per request */
            font-weight: 800;
            transform: translateY(-20px);
            letter-spacing: -1px;
        }

        .vertical-divider {
            position: absolute;
            top: 0;
            left: 100%;
            margin-left: -3px; /* Overlap further into navy sidebar to hide white line */
            height: 100%;
            width: auto;
            z-index: 10;
            pointer-events: none;
        }

        .contents-content {
            flex: 1;
            padding: 160px 48px;
            background-color: white; /* Content area is white */
        }

        .contents-list {
            list-style: none;
        }

        .contents-item {
            display: flex;
            align-items: center;
            margin-bottom: 50px;
            font-size: 50px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .item-number { margin-right: 40px; min-width: 60px; }
        .item-text { font-size: 50px; font-weight: 700; }

        /* --- Slide 3: Content Page --- */
        .content-slide .content-top {
            height: 80px; /* Narrower header as per image */
            background-color: var(--primary-dark);
            position: relative;
            padding: 0 100px;
            display: flex;
            align-items: center;
            z-index: 10;
        }

        .content-slide .content-title {
            color: var(--text-white);
            font-size: 40px;
            font-weight: 800;
        }

        .content-slide .pointy-divider {
            position: absolute;
            top: 100%;
            left: 0;
            width: 1920px;
            height: auto;
            margin-top: -3px; /* Overlap further into navy to hide white line */
            z-index: 10;
            pointer-events: none;
        }

        .slide-number {
            position: absolute;
            bottom: 40px;
            right: 60px;
            font-size: 24px;
            color: #999;
            font-weight: 500;
        }

        .content-slide .body-area {
            padding: 100px 150px;
            background-color: white; /* Ensure content is white */
            min-height: calc(1080px - 80px); /* Fill remaining height */
        }

        .bullet-list {
            list-style: none;
        }

        .bullet-item {
            font-size: 45px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            color: var(--text-dark);
        }

        .bullet-dot {
            width: 15px;
            height: 15px;
            background-color: var(--accent-red);
            margin-right: 30px;
            border-radius: 2px;
        }

        /* --- Slide 4: Ending --- */
        .ppt-slide.ending-slide.active {
            display: flex !important;
            background-color: white;
        }

        .ending-left {
            flex: 1.2;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            position: relative;
        }

        .thank-you-text {
            font-size: 160px;
            font-weight: 800;
            color: #C1C6C8; /* Gray color from image */
            line-height: 0.9;
            text-align: left;
            transform: translateX(-50px);
        }

        .ending-right {
            flex: 1;
            background-color: var(--primary-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .qna-text {
            color: var(--text-white);
            font-size: 80px;
            font-weight: 800;
        }

        .ending-divider {
            position: absolute;
            top: 0;
            right: 100%; /* Position on the left side of the navy area */
            height: 100%;
            width: auto;
            margin-right: -3px; /* Overlap to hide white line */
            z-index: 10;
            pointer-events: none;
        }

        /* --- Controls --- */
        .controls {
            position: fixed;
            bottom: 40px;
            right: 40px;
            display: flex;
            gap: 20px;
            z-index: 100;
        }

        .nav-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 30px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .nav-btn:hover {
            background: rgba(0, 0, 0, 0.8);
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.1);
        }

        .page-indicator {
            position: absolute;
            bottom: 45px;
            right: 150px; /* Aligned with typical content margins */
            color: #aaaaaa;
            font-size: 24px;
            font-weight: 500;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="ppt-wrapper">
        <!-- Slide 1: Cover -->
        <div class="ppt-slide active cover-slide" id="slide-1">
            <div class="cover-top">
                <img src="u5.png" alt="Graphic" class="background-globe">
                <img src="divinder.png" alt="Divider" class="cover-divider">
                <div class="">
                    <div class="vision-text">VISION 2034</div>
                    <h1 class="main-title">제목을 입력하세요</h1>
                </div>
            </div>
            <div class="cover-bottom">
                <ul class="info-list" style="">
                    <li class="info-item">
                        <svg class="info-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        <span>소속팀 / 작성자</span>
                    </li>
                    <li class="info-item">
                        <svg class="info-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        <span>00매</span>
                    </li>
                    <li class="info-item">
                        <svg class="info-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        <span>2026.00.00</span>
                    </li>
                </ul>
                <img src="Logo.png" alt="OSSTEM Logo" class="osstem-logo" width="200" height="117">
            </div>
        </div>

        <!-- Slide 2: Contents -->
        <div class="ppt-slide contents-slide" id="slide-2">
            <div class="contents-slide-inner" style="display: flex; width: 100%; height: 100%;">
                <div class="sidebar">
                    <h2 class="sidebar-title">Contents</h2>
                    <img src="divinder_2.png" alt="Vertical Divider" class="vertical-divider">
                </div>
                <div class="contents-content">
                    <ul class="contents-list">
                        <li class="contents-item">
                            <span class="item-number">1.</span>
                            <span class="item-text">내용</span>
                        </li>
                        <li class="contents-item" style="animation-delay: 0.1s;">
                            <span class="item-number">2.</span>
                            <span class="item-text">내용</span>
                        </li>
                        <li class="contents-item" style="animation-delay: 0.2s;">
                            <span class="item-number">3.</span>
                            <span class="item-text">내용</span>
                        </li>
                        <li class="contents-item" style="animation-delay: 0.3s;">
                            <span class="item-number">4.</span>
                            <span class="item-text">내용</span>
                        </li>
                        <li class="contents-item" style="">
                            <span class="item-number">5.</span>
                            <span class="item-text">내용</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- Slide 3: Content Page -->
        <div class="ppt-slide content-slide" id="slide-3">
            <div class="content-top">
                <img src="divinder_3.png" alt="Divider" class="pointy-divider">
                <h2 class="content-title">I. Contents1</h2>
            </div>
            <div class="body-area">
                <ul class="bullet-list">
                    <li class="bullet-item"><div class="bullet-dot"></div> 상세 내용이 들어갑니다.</li>
                    <li class="bullet-item"><div class="bullet-dot"></div> 주요 지표 및 성과를 기술합니다.</li>
                    <li class="bullet-item"><div class="bullet-dot"></div> 핵심 전략 방향을 제시합니다.</li>
                </ul>
            </div>
            <div class="page-indicator">3 / 4</div>
        </div>

        <div class="ppt-slide ending-slide" id="slide-4">
            <div class="ending-left">
                <div class="thank-you-text">Thank<br>you.</div>
            </div>
            <div class="ending-right">
                <img src="divinder_4.png" alt="divider" class="ending-divider">
                <div class="qna-text">Q&A</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="nav-btn" id="prevBtn">←</button>
        <button class="nav-btn" id="nextBtn">→</button>
    </div>

    <script>
        const slides = document.querySelectorAll('.ppt-slide');
        const indicator = document.querySelector('.page-indicator');
        let currentIdx = 0;

        function showSlide(index) {
            if (slides.length === 0) return;
            slides.forEach((slide, i) => {
                slide.classList.toggle('active', i === index);
                
                // If it's a content slide with an indicator, update its text
                const slideIndicator = slide.querySelector('.page-indicator');
                if (slideIndicator) {
                    slideIndicator.textContent = `${i + 1} / ${slides.length}`;
                }
            });
        }

        document.getElementById('nextBtn').addEventListener('click', () => {
            if (currentIdx < slides.length - 1) {
                currentIdx++;
                showSlide(currentIdx);
            }
        });

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentIdx > 0) {
                currentIdx--;
                showSlide(currentIdx);
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                if (currentIdx < slides.length - 1) { currentIdx++; showSlide(currentIdx); }
            } else if (e.key === 'ArrowLeft') {
                if (currentIdx > 0) { currentIdx--; showSlide(currentIdx); }
            }
        });

        function adjustScale() {
            const wrapper = document.getElementById('ppt-wrapper');
            if (!wrapper) return;
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080) * 0.95;
            wrapper.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            adjustScale();
            showSlide(currentIdx);
        });
        window.addEventListener('resize', adjustScale);
        
        // Immediate call in case DOMContentLoaded already fired
        adjustScale();
        showSlide(currentIdx);
    </script>
</body>
</html>
